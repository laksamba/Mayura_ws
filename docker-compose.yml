version: '3.8'

services:
  websocket-server:
    build: .
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-secret-key}
      PORT: 3001
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
